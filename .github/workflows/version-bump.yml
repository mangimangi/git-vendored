# .github/workflows/version-bump.yml
# Two-job workflow: bump and publish are mutually exclusive.
#
# Bump job:  Runs on non-bump pushes to main and workflow_dispatch.
#            Calls `release bump` which handles protected branch fallback.
# Publish job: Runs when a `chore: bump version` commit lands on main.
#              Calls `release publish` to create tags and GitHub releases.
#
# All logic lives in .vendored/pkg/git-semver/release (updated via vendor install).
# This workflow is a thin shell: triggers, permissions, and context passing.
#
# Uses GITHUB_TOKEN — no PAT required.

name: Bump & Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      subdirectory:
        description: 'Subdirectory to bump (leave empty for root)'
        required: false
        type: string
      changelog_description:
        description: 'Changelog entry (what changed in this release)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       !startsWith(github.event.head_commit.message, 'chore: bump version') &&
       !startsWith(github.event.head_commit.message, 'chore: install'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Bump
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          INPUT_BUMP_TYPE: ${{ inputs.bump_type || '' }}
          INPUT_SUBDIRECTORY: ${{ inputs.subdirectory || '' }}
          INPUT_CHANGELOG_DESCRIPTION: ${{ inputs.changelog_description || '' }}
        run: python3 .vendored/pkg/git-semver/release bump

  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      startsWith(github.event.head_commit.message, 'chore: bump version')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 .vendored/pkg/git-semver/release publish
